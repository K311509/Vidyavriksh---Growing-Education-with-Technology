spring.application.name=Vidyavriksh

# Server
server.port=8080

# MongoDB Local
# MongoDB Connection
spring.data.mongodb.uri=mongodb://localhost:27017/vidyavriksh
spring.data.mongodb.database=vidyavriksh
spring.data.mongodb.auto-index-creation=true

# JWT
jwt.secret=VidyaVrikshSecretKeyForJWTTokenGenerationMustBeLongEnoughForHS512Algorithm2024
jwt.expiration=86400000  

# Logging
logging.level.root=INFO
logging.level.com.vidyavriksh=DEBUG

# CORS (React Frontend)
cors.allowed.origins=http://localhost:3000,http://localhost:5173

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

















